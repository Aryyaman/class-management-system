{% extends 'base.html' %}
{% block content %}
<div class="form-container login-box">
    <h1>Welcome Back</h1>
    <p>Sign in to your EduManage account</p>
    
    <form method="POST">
        <div class="form-group" style="text-align: left;">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group" style="text-align: left;">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" style="width: 100%; margin-top: 10px;">Login</button>
    </form>
    
    <div style="margin-top:20px; font-size:13px; color:var(--text-secondary);">
        Admin config: username=admin, password=admin123
    </div>
</div>
{% endblock %}
