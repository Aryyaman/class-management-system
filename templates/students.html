{% extends 'base.html' %}
{% block content %}
<div class="flex-between">
    <h1>Student Directory</h1>
    <a href="{{ url_for('add_student') }}" class="btn"><i class="fa-solid fa-plus"></i> Add Student</a>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Roll No.</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for s in students %}
            <tr>
                <td>{{ s.id }}</td>
                <td><div style="font-weight:600; color:var(--text-primary);">{{ s.name }}</div></td>
                <td>{{ s.roll }}</td>
                <td>{{ s.dept }}</td>
                <td>
                    <form action="{{ url_for('delete_student', id=s.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this student?');">
                        <button type="submit" class="btn-danger"><i class="fa-solid fa-trash"></i> Delete</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5" style="text-align: center; color: var(--text-secondary);">No students found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
