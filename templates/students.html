<div class="content">

<h1>Students</h1>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Roll</th>
<th>Dept</th>
</tr>

{% for s in students %}

<td>{{s.name}}</td>
<td>{{s.roll}}</td>
<td>{{s.dept}}</td>
</tr>
{% endfor %}

</table>

</div>
