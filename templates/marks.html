{% extends 'base.html' %}
{% block content %}
<div class="flex-between">
    <h1>Marks Entry</h1>
</div>

<div class="table-container" style="padding: 24px;">
    <form method="GET" class="filter-form">
        <div class="form-group">
            <label>Select Course</label>
            <select name="course_id" required>
                <option value="">-- Select Course --</option>
                {% for c in courses %}
                <option value="{{ c.id }}" {% if c.id == course_id %}selected{% endif %}>{{ c.code }} - {{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn" style="height: 44px;">Load Students</button>
    </form>
    
    {% if course_id %}
    <hr style="border:0; border-top:1px solid var(--border); margin: 20px 0;">
    <form method="POST">
        <input type="hidden" name="course_id" value="{{ course_id }}">
        <table style="margin-bottom: 20px;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Roll No.</th>
                    <th>Marks</th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s.id }}</td>
                    <td>{{ s.name }}</td>
                    <td>{{ s.roll }}</td>
                    <td>
                        <input type="number" name="marks_{{ s.id }}" value="{{ marks_data.get(s.id, '') }}" min="0" max="100" style="width:100px;">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button type="submit">Save Marks</button>
    </form>
    {% endif %}
</div>
{% endblock %}
