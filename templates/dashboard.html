{% extends 'base.html' %}
{% block content %}
<h1>Dashboard Overview</h1>

<div class="card-grid">
    <div class="card">
        <h2>{{ total }}</h2>
        <p>Total Enrolled Students</p>
    </div>
    
    <div class="card">
        <h2>{{ avg_attendance }}%</h2>
        <p>Average Attendance</p>
    </div>
    
    <div class="card">
        <h2>{{ avg_marks }}</h2>
        <p>Average Academic Score</p>
    </div>
</div>

<div class="card" style="margin-top: 20px;">
    <h3>Recent Activity</h3>
    <p style="margin-top: 10px; color: var(--text-secondary);">System updated and synced.</p>
</div>
{% endblock %}
